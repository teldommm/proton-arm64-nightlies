name: Proton ARM64 Bleeding-Edge Build

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner to use'
        required: false
        default: 'ubuntu-24.04'
        type: choice
        options:
          - ubuntu-24.04
          - self-hosted
      target_app_id:
        description: 'Target Android app id for hardcoded wine paths'
        required: false
        default: 'app.gamenative'
        type: choice
        options:
          - app.gamenative
          - com.winlator.cmod
      wine_ref:
        description: 'Valve wine ref (branch/tag/commit)'
        required: false
        default: 'bleeding-edge'
        type: string
      gamenative_ref:
        description: 'GameNative proton-wine ref (branch/tag/commit)'
        required: false
        default: 'proton_10.0'
        type: string
      force_build:
        description: 'Force a build even if upstream HEAD is unchanged'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Check upstream bleeding-edge head
        id: upstream_check
        run: |
          WINE_REF="${{ github.event.inputs.wine_ref || 'bleeding-edge' }}"
          FORCE_BUILD="${{ github.event.inputs.force_build || 'false' }}"
          PREV_GIT_HASH="$(python3 -c 'import json; d=json.load(open("latest.json")); print(d.get("gitHash",""))')"

          if printf '%s' "$WINE_REF" | grep -Eq '^[0-9a-fA-F]{7,40}$'; then
            REMOTE_FULL_HASH="$WINE_REF"
          else
            REMOTE_FULL_HASH="$(git ls-remote https://github.com/ValveSoftware/wine "$WINE_REF" "refs/heads/$WINE_REF" "refs/tags/$WINE_REF" | awk 'NR==1 {print $1}')"
          fi

          if [ -z "$REMOTE_FULL_HASH" ]; then
            echo "ERROR: could not resolve upstream ref $WINE_REF"
            exit 1
          fi

          REMOTE_SHORT_HASH="$(printf '%s' "$REMOTE_FULL_HASH" | cut -c1-7)"
          SKIP_BUILD=false
          if [ "$FORCE_BUILD" != 'true' ] && [ "$REMOTE_SHORT_HASH" = "$PREV_GIT_HASH" ]; then
            SKIP_BUILD=true
          fi

          echo "resolved_hash=$REMOTE_FULL_HASH" >> "$GITHUB_OUTPUT"
          echo "resolved_short_hash=$REMOTE_SHORT_HASH" >> "$GITHUB_OUTPUT"
          echo "skip_build=$SKIP_BUILD" >> "$GITHUB_OUTPUT"
          echo "Previous gitHash: $PREV_GIT_HASH"
          echo "Remote   gitHash: $REMOTE_SHORT_HASH"
          echo "force_build=$FORCE_BUILD"
          echo "skip_build=$SKIP_BUILD"

      - name: Stop early when upstream is unchanged
        if: steps.upstream_check.outputs.skip_build == 'true'
        run: echo "Skipping build: upstream bleeding-edge HEAD matches latest.json"

      - name: Free up disk space
        if: steps.upstream_check.outputs.skip_build != 'true'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Set up build environment
        if: steps.upstream_check.outputs.skip_build != 'true'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            wget \
            curl \
            unzip \
            flex \
            bison \
            gettext \
            autoconf \
            automake \
            libtool \
            pkg-config \
            mingw-w64 \
            gcc-multilib \
            g++-multilib \
            libfreetype6-dev \
            libfreetype6-dev:i386 \
            libpng-dev \
            libpng-dev:i386 \
            zlib1g-dev \
            zlib1g-dev:i386 \
            zstd \
            xz-utils \
            python3-zstandard \
            patch

      - name: Clone Wine source (ValveSoftware bleeding-edge by default)
        if: steps.upstream_check.outputs.skip_build != 'true'
        run: |
          rm -rf wine-source
          WINE_REF="${{ github.event.inputs.wine_ref || 'bleeding-edge' }}"
          git clone --depth=1 --branch "$WINE_REF" \
            https://github.com/ValveSoftware/wine wine-source \
          || {
            git clone --depth=1 https://github.com/ValveSoftware/wine wine-source
            git -C wine-source fetch --depth=1 origin "$WINE_REF"
            git -C wine-source checkout FETCH_HEAD
          }
          echo "Wine ref: $WINE_REF"
          git -C wine-source rev-parse HEAD
      - name: Clone GameNative patches and build scripts
        if: steps.upstream_check.outputs.skip_build != 'true'
        run: |
          GN_REF="${{ github.event.inputs.gamenative_ref || 'proton_10.0' }}"
          git clone --depth=1 --branch "$GN_REF" \
            https://github.com/GameNative/proton-wine gamenative-src \
          || {
            git clone --depth=1 https://github.com/GameNative/proton-wine gamenative-src
            git -C gamenative-src fetch --depth=1 origin "$GN_REF"
            git -C gamenative-src checkout FETCH_HEAD
          }
          echo "GameNative ref: $GN_REF"
          git -C gamenative-src rev-parse HEAD
          cp -r gamenative-src/android wine-source/android
          cp -r gamenative-src/build-scripts wine-source/build-scripts
          rm -rf gamenative-src

          # Normalize patch line endings (some upstream patches can be CRLF and
          # fail under git apply as "corrupt patch" despite valid content).
          find wine-source/android/patches -type f -name "*.patch" -exec sed -i 's/\r$//' {} +

          # Fix a GameNative OpenGL patch bug before application. The upstream
          # patch parses the literal string "WINE_X11FORCEGLX" instead of the
          # env var value, which breaks the Android GLX force path.
          sed -i 's/atoi("WINE_X11FORCEGLX")/atoi(getenv("WINE_X11FORCEGLX"))/g' \
            wine-source/android/patches/dlls_winex11_drv_opengl_c.patch

          # Comment out patches already merged into bleeding-edge (or handled by
          # fix_*.py scripts) so they don't get double-applied or fail the build.
          python3 scripts/filter_patches.py \
            wine-source/build-scripts/build-step-arm64ec.sh \
            wine-source

          # Rewrite bare 'git apply' in the build script to use forgiving options
          # (-C1, --ignore-whitespace) and continue on failure instead of aborting.
          python3 scripts/patch_build_script.py \
            wine-source/build-scripts/build-step-arm64ec.sh

          # Apply Android-specific window.c changes (xinput2 guards, class_hints,
          # _NET_WM_PID) via script - the patch is too drifted to apply cleanly.
          python3 scripts/fix_window_c.py wine-source

          # Ensure initialize_xstate_features is declared before use for PE
          # cross-compile targets (aarch64-windows, arm64ec-windows) where
          # none of the native arch macros are defined.
          python3 scripts/fix_wineboot_c.py wine-source

          # Remove i386 C++ mangled stubs from wdscore.spec that cause
          # lld-link "Invalid ARM64EC function name" errors.
          python3 scripts/fix_wdscore.py wine-source

          # Exclude FEX stats shm block on Android - shm_open is in libc but
          # the ntdll.so link step doesn't pull it in, causing undefined symbol.
          python3 scripts/fix_virtual_c.py wine-source

          # Apply suspend-bypass chain directly when test-bylaws patches drift.
          python3 scripts/fix_suspend_chain.py wine-source

          # Force-apply additional BYLAWS drift-prone patches and verify markers.
          echo "=== fix_test_bylaws_chain.py header ==="
          sed -n '1,40p' scripts/fix_test_bylaws_chain.py
          if ! grep -q 'Script rev: 2026-03-07-driftproof-v2' scripts/fix_test_bylaws_chain.py; then echo 'ERROR: stale fix_test_bylaws_chain.py in runner'; exit 97; fi
          python3 scripts/fix_test_bylaws_chain.py wine-source


          # Rewrite the baked-in install prefix from the Termux CI path to the
          # actual custom Proton install directory used by GameNative imports.
          # This workflow packages type=Proton with a parser-compatible numeric
          # versionName so stock GameNative recognizes it as ARM64EC without any
          # app-side parser changes. GameNative normalizes that to
          # /opt/proton-10.0.99-arm64ec on-device.
          # If Wine is built against /opt/wine instead, builtin DLL resolution points at
          # the wrong tree after import and startup dies during kernel32 initialization.
          # libredirect still rewrites com.winlator.cmod -> app.gamenative at runtime.
          INSTALL_DIR="/data/data/com.winlator.cmod/files/imagefs/opt/proton-10.0.99-arm64ec"
          # RUNTIME_PATH is baked into wine's ELF RUNPATH via -Wl,-rpath=.
          # It must point somewhere libredirect can rewrite, not com.termux.
          # Use com.winlator.cmod path so libredirect's rewrite rule applies.
          RUNTIME_PATH="/data/data/com.winlator.cmod/files/imagefs/usr"
          echo "Using install_dir=$INSTALL_DIR"
          echo "Using RUNTIME_PATH=$RUNTIME_PATH"
          sed -i "s|export install_dir=.*|export install_dir=${INSTALL_DIR}|" wine-source/build-scripts/build-step-arm64ec.sh
          sed -i "s|export RUNTIME_PATH=.*|export RUNTIME_PATH=\"${RUNTIME_PATH}\"|" wine-source/build-scripts/build-step-arm64ec.sh

      - name: Download and extract termuxfs for aarch64
        if: steps.upstream_check.outputs.skip_build != 'true'
        run: |
          TERMUX_DIR="$HOME/termuxfs/aarch64"
          if [ ! -d "$TERMUX_DIR/data/data/com.termux/files/usr/include" ]; then
            echo "termuxfs not found, downloading..."
            mkdir -p "$TERMUX_DIR"
            cd "$TERMUX_DIR"
            wget -q https://github.com/GameNative/termux-on-gha/releases/download/build-20260218/termuxfs-aarch64.tar
            tar -xf termuxfs-aarch64.tar
            rm -f termuxfs-aarch64.tar
          else
            echo "termuxfs already present, skipping download."
          fi

      - name: Set up Android NDK
        if: steps.upstream_check.outputs.skip_build != 'true'
        run: |
          NDK_DIR="$HOME/Android/Sdk/ndk/27.3.13750724"
          if [ ! -f "$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android28-clang" ]; then
            echo "NDK not found, downloading..."
            mkdir -p "$HOME/Android/Sdk/ndk"
            cd "$HOME/Android/Sdk/ndk"
            wget -q https://dl.google.com/android/repository/android-ndk-r27d-linux.zip
            unzip -q android-ndk-r27d-linux.zip
            mv android-ndk-r27d 27.3.13750724
          else
            echo "NDK already installed, skipping download."
          fi

      - name: Set up LLVM MinGW toolchain
        if: steps.upstream_check.outputs.skip_build != 'true'
        run: |
          LLVM_DIR="$HOME/toolchains/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64"
          if [ ! -f "$LLVM_DIR/bin/llvm-dlltool" ]; then
            echo "LLVM MinGW not found, downloading..."
            mkdir -p "$HOME/toolchains"
            cd "$HOME/toolchains"
            wget -q https://github.com/bylaws/llvm-mingw/releases/download/20250920/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
            tar -xf llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
          else
            echo "LLVM MinGW already installed, skipping download."
          fi

      - name: Add bylaws llvm-mingw to PATH
        if: steps.upstream_check.outputs.skip_build != 'true'
        run: |
          echo "$HOME/toolchains/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64/bin" >> $GITHUB_PATH

      - name: Run autogen.sh
        if: steps.upstream_check.outputs.skip_build != 'true'
        run: |
          cd wine-source
          bash autogen.sh

      - name: Cache wine-tools
        if: steps.upstream_check.outputs.skip_build != 'true'
        id: cache-wine-tools
        uses: actions/cache@v4
        with:
          path: wine-source/wine-tools
          key: wine-tools-${{ hashFiles('wine-source/configure.ac', 'wine-source/configure') }}
          restore-keys: wine-tools-

      - name: Build wine-tools
        if: steps.upstream_check.outputs.skip_build != 'true' && steps.cache-wine-tools.outputs.cache-hit != 'true'
        run: |
          cd wine-source
          mkdir -p wine-tools
          cd wine-tools
          ../configure --without-x --without-gstreamer --without-vulkan --without-wayland
          make -j$(nproc) __tooldeps__ nls/all

      - name: Build sysvshm library
        if: steps.upstream_check.outputs.skip_build != 'true'
        run: |
          cd wine-source
          bash build-scripts/build-step-arm64ec.sh --build-sysvshm

      - name: Configure build
        if: steps.upstream_check.outputs.skip_build != 'true'
        run: |
          cd wine-source
          bash build-scripts/build-step-arm64ec.sh --configure

      - name: Verify critical patch markers
        if: steps.upstream_check.outputs.skip_build != 'true'
        run: |
          python3 scripts/verify_required_markers.py wine-source

      - name: Build Proton
        if: steps.upstream_check.outputs.skip_build != 'true'
        run: |
          cd wine-source
          bash build-scripts/build-step-arm64ec.sh --build

      - name: Install Proton
        if: steps.upstream_check.outputs.skip_build != 'true'
        run: |
          # build-step-arm64ec.sh --install runs 'make install' directly into
          # $install_dir = /data/data/com.winlator.cmod/files/imagefs/opt/wine
          # which doesn't exist on a hosted runner. Pre-create it with sudo so
          # make install can write there, then let the script copy to OUTPUT_DIR.
          sudo mkdir -p /data/data/com.winlator.cmod/files/imagefs/opt/proton-10.0.99-arm64ec
          sudo chmod -R 777 /data/data

          cd wine-source
          bash build-scripts/build-step-arm64ec.sh --install

          OUTPUT_DIR="$HOME/compiled-files-aarch64"
          echo "=== OUTPUT_DIR bin contents ==="
          ls -la "$OUTPUT_DIR/bin/"
          echo "=== wine binary type ==="
          file "$OUTPUT_DIR/bin/wine" 2>/dev/null || true
          file "$OUTPUT_DIR/bin/wineserver" 2>/dev/null || true

      - name: Download prefixPack.txz
        if: steps.upstream_check.outputs.skip_build != 'true'
        run: |
          wget https://github.com/GameNative/bionic-prefix-files/raw/main/prefixPack-arm64ec.txz \
            -O $HOME/compiled-files-aarch64/prefixPack.txz

      - name: Generate profile.json files and package
        if: steps.upstream_check.outputs.skip_build != 'true'
        run: |
          OUTPUT_DIR="$HOME/compiled-files-aarch64"
          GIT_HASH=$(git -C wine-source rev-parse --short HEAD)
          GIT_DATE=$(git -C wine-source log -1 --format='%cd' --date=format:'%Y%m%d')
          VERSION="proton-bleeding-edge-${GIT_DATE}-${GIT_HASH}-arm64ec"

          mkdir -p "$GITHUB_WORKSPACE/output"

          # versionName: GameNative installs to /opt/proton-{versionName}/
          # Keep it numeric so the stock WineInfo parser accepts it, but use a
          # non-stable value so it doesn't collide with shipped builds.
          # Both Proton and Wine profiles use "wine" as the paths key (confirmed from
          # GameNative/proton-wine build-proton.yml). Proton versionCode=1, Wine versionCode=0.
          PROFILE_VERSION="10.0.99-arm64ec"
          PROTON_VERSION_CODE=1
          WINE_VERSION_CODE=0

          # Proton profile - for GameNative (Zstandard-compressed .wcp)
          python3 scripts/generate_profile.py \
            "${OUTPUT_DIR}/profile.json" \
            "${PROFILE_VERSION}" \
            "${PROTON_VERSION_CODE}" \
            "Proton bleeding-edge ARM64 ${GIT_DATE} (${GIT_HASH})"

          bash "$GITHUB_WORKSPACE/scripts/create-proton-wcp.sh" \
            "$OUTPUT_DIR" \
            "$GITHUB_WORKSPACE/output/proton-${VERSION}.wcp" \
            "${PROFILE_VERSION}" \
            "${PROTON_VERSION_CODE}" \
            "Proton bleeding-edge ARM64 ${GIT_DATE} (${GIT_HASH})"

          # Wine profile - for Winlator CMOD / Ludashi (XZ-compressed, .wcp.xz extension)
          python3 "$GITHUB_WORKSPACE/scripts/generate_profile.py" \
            "${OUTPUT_DIR}/profile.json" \
            "${PROFILE_VERSION}" \
            "${WINE_VERSION_CODE}" \
            "Proton bleeding-edge ARM64 ${GIT_DATE} (${GIT_HASH})" \
            wine

          cd "$OUTPUT_DIR"
          tar cJf "$GITHUB_WORKSPACE/output/proton-wine-${VERSION}.wcp.xz" \
            bin lib share prefixPack.txz profile.json

          cd "$GITHUB_WORKSPACE"
          sha256sum output/proton-wine-${VERSION}.wcp.xz > output/proton-wine-${VERSION}.wcp.xz.sha256

          ls -lh output/

      - name: Detect release-worthy changes
        if: steps.upstream_check.outputs.skip_build != 'true'
        id: detect_changes
        run: |
          GIT_HASH=$(git -C wine-source rev-parse --short HEAD)
          GIT_DATE=$(git -C wine-source log -1 --format='%cd' --date=format:'%Y%m%d')
          VERSION="proton-bleeding-edge-${GIT_DATE}-${GIT_HASH}-arm64ec"
          RELEASE_TAG="bleeding-edge-${GIT_DATE}-${GIT_HASH}"
          WCP_SHA=$(cut -d' ' -f1 output/proton-${VERSION}.wcp.sha256)
          WCPXZ_SHA=$(cut -d' ' -f1 output/proton-wine-${VERSION}.wcp.xz.sha256)
          PREV_GIT_HASH="$(python3 -c 'import json; d=json.load(open("latest.json")); print(d.get("gitHash",""))')"
          PREV_WCP_SHA="$(python3 -c 'import json; d=json.load(open("latest.json")); print(d.get("wcp",{}).get("sha256",""))')"
          PREV_WCPXZ_SHA="$(python3 -c 'import json; d=json.load(open("latest.json")); print(d.get("wcpxz",{}).get("sha256",""))')"

          SHOULD_RELEASE=false
          if [ "$GIT_HASH" != "$PREV_GIT_HASH" ] || [ "$WCP_SHA" != "$PREV_WCP_SHA" ] || [ "$WCPXZ_SHA" != "$PREV_WCPXZ_SHA" ]; then
            SHOULD_RELEASE=true
          fi

          echo "git_hash=$GIT_HASH" >> "$GITHUB_OUTPUT"
          echo "git_date=$GIT_DATE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "wcp_sha=$WCP_SHA" >> "$GITHUB_OUTPUT"
          echo "wcpxz_sha=$WCPXZ_SHA" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"

          echo "Previous gitHash: $PREV_GIT_HASH"
          echo "Current  gitHash: $GIT_HASH"
          echo "Previous wcp sha: $PREV_WCP_SHA"
          echo "Current  wcp sha: $WCP_SHA"
          echo "Previous wcpxz sha: $PREV_WCPXZ_SHA"
          echo "Current  wcpxz sha: $WCPXZ_SHA"
          echo "should_release=$SHOULD_RELEASE"

      - name: Upload artifacts
        if: steps.upstream_check.outputs.skip_build != 'true' && steps.detect_changes.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: proton-arm64-nightly
          path: output/
          retention-days: 30

      - name: Create GitHub Release
        if: steps.upstream_check.outputs.skip_build != 'true' && steps.detect_changes.outputs.should_release == 'true'
        run: |
          GIT_HASH="${{ steps.detect_changes.outputs.git_hash }}"
          GIT_DATE="${{ steps.detect_changes.outputs.git_date }}"
          VERSION="${{ steps.detect_changes.outputs.version }}"
          TAG="${{ steps.detect_changes.outputs.release_tag }}"
          gh release create "$TAG" output/* \
            --title "Proton bleeding-edge ARM64 (${GIT_DATE})" \
            --notes "Built from ValveSoftware/wine bleeding-edge @ ${GIT_HASH} with GameNative Android + ARM64EC patches. Automated bleeding-edge build ? use at your own risk." \
            --prerelease \
            || gh release upload "$TAG" output/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest.json
        if: steps.upstream_check.outputs.skip_build != 'true' && steps.detect_changes.outputs.should_release == 'true'
        run: |
          GIT_HASH="${{ steps.detect_changes.outputs.git_hash }}"
          GIT_DATE="${{ steps.detect_changes.outputs.git_date }}"
          VERSION="${{ steps.detect_changes.outputs.version }}"
          WCP_SHA="${{ steps.detect_changes.outputs.wcp_sha }}"
          WCPXZ_SHA="${{ steps.detect_changes.outputs.wcpxz_sha }}"
          python3 scripts/generate_latest.py \
            "latest.json" \
            "${VERSION}" \
            "${GIT_DATE}" \
            "${GIT_HASH}" \
            "proton-${VERSION}.wcp" \
            "${WCP_SHA}" \
            "proton-wine-${VERSION}.wcp.xz" \
            "${WCPXZ_SHA}" \
            "${{ steps.detect_changes.outputs.release_tag }}"
          cat latest.json

      - name: Commit latest.json
        if: steps.upstream_check.outputs.skip_build != 'true' && steps.detect_changes.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          GIT_DATE="${{ steps.detect_changes.outputs.git_date }}"
          git diff --staged --quiet || git commit -m "chore: update latest.json for bleeding-edge ${GIT_DATE}"
          git pull --rebase origin HEAD
          git push














      - name: Cleanup runner workspace
        if: ${{ always() && contains(runner.labels, 'self-hosted') }}
        run: |
          set +e
          echo "=== Disk usage before cleanup ==="
          df -h
          rm -rf "$GITHUB_WORKSPACE/wine-source" "$GITHUB_WORKSPACE/gamenative-src" "$GITHUB_WORKSPACE/output" || true
          rm -rf "$HOME/compiled-files-aarch64" "$HOME/wine-staging" || true
          rm -rf "$RUNNER_TEMP"/* || true
          echo "=== Disk usage after cleanup ==="
          df -h









