name: Proton ARM64 Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner to use'
        required: false
        default: 'ubuntu-24.04'
        type: choice
        options:
          - ubuntu-24.04
          - self-hosted

jobs:
  build:
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up build environment
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            wget \
            curl \
            unzip \
            flex \
            bison \
            gettext \
            autoconf \
            automake \
            libtool \
            pkg-config \
            mingw-w64 \
            gcc-multilib \
            g++-multilib \
            libfreetype6-dev \
            libfreetype6-dev:i386 \
            libpng-dev \
            libpng-dev:i386 \
            zlib1g-dev \
            zlib1g-dev:i386 \
            zstd \
            xz-utils \
            python3-zstandard

      - name: Clone Wine source (ValveSoftware bleeding-edge)
        run: |
          rm -rf wine-source
          git clone --depth=1 --branch bleeding-edge \
            https://github.com/ValveSoftware/wine wine-source

      - name: Clone GameNative patches and build scripts
        run: |
          git clone --depth=1 --branch proton_10.0 \
            https://github.com/GameNative/proton-wine gamenative-src
          cp -r gamenative-src/android wine-source/android
          cp -r gamenative-src/build-scripts wine-source/build-scripts
          rm -rf gamenative-src

          # Comment out patches already merged into bleeding-edge (or handled by
          # fix_*.py scripts) so they don't get double-applied or fail the build.
          python3 scripts/filter_patches.py \
            wine-source/build-scripts/build-step-arm64ec.sh \
            wine-source

          # Rewrite bare 'git apply' in the build script to use forgiving options
          # (-C1, --ignore-whitespace) and continue on failure instead of aborting.
          python3 scripts/patch_build_script.py \
            wine-source/build-scripts/build-step-arm64ec.sh

          # Apply Android-specific window.c changes (xinput2 guards, class_hints,
          # _NET_WM_PID) via script — the patch is too drifted to apply cleanly.
          python3 scripts/fix_window_c.py wine-source

          # Exclude FEX stats shm block on Android — shm_open is in libc but
          # the ntdll.so link step doesn't pull it in, causing undefined symbol.
          python3 scripts/fix_virtual_c.py wine-source

      - name: Cache termuxfs aarch64
        id: cache-termuxfs
        uses: actions/cache@v4
        with:
          path: ~/termuxfs/aarch64
          key: termuxfs-aarch64-build-20260218

      - name: Download and extract termuxfs for aarch64
        if: steps.cache-termuxfs.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget https://github.com/GameNative/termux-on-gha/releases/download/build-20260218/termuxfs-aarch64.tar
          tar -xf termuxfs-aarch64.tar
          ls -la $HOME/termuxfs/aarch64/

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/Android/Sdk/ndk/27.3.13750724
          key: android-ndk-r27d

      - name: Set up Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/Android/Sdk/ndk
          cd $HOME/Android/Sdk/ndk
          wget https://dl.google.com/android/repository/android-ndk-r27d-linux.zip
          unzip -q android-ndk-r27d-linux.zip
          mv android-ndk-r27d 27.3.13750724

      - name: Cache LLVM MinGW toolchain
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: ~/toolchains/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64
          key: bylaws-llvm-mingw-20250920

      - name: Set up LLVM MinGW toolchain
        if: steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/toolchains
          cd $HOME/toolchains
          wget https://github.com/bylaws/llvm-mingw/releases/download/20250920/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
          tar -xf llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz

      - name: Add bylaws llvm-mingw to PATH
        run: |
          echo "$HOME/toolchains/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64/bin" >> $GITHUB_PATH

      - name: Run autogen.sh
        run: |
          cd wine-source
          bash autogen.sh

      - name: Cache wine-tools
        id: cache-wine-tools
        uses: actions/cache@v4
        with:
          path: wine-source/wine-tools
          key: wine-tools-${{ hashFiles('wine-source/configure.ac', 'wine-source/configure') }}
          restore-keys: wine-tools-

      - name: Build wine-tools
        if: steps.cache-wine-tools.outputs.cache-hit != 'true'
        run: |
          cd wine-source
          mkdir wine-tools
          cd wine-tools
          ../configure --without-x --without-gstreamer --without-vulkan --without-wayland
          make -j$(nproc) __tooldeps__ nls/all

      - name: Build sysvshm library
        run: |
          cd wine-source
          bash build-scripts/build-step-arm64ec.sh --build-sysvshm

      - name: Configure build
        run: |
          cd wine-source
          bash build-scripts/build-step-arm64ec.sh --configure

      - name: Build Proton
        run: |
          cd wine-source
          bash build-scripts/build-step-arm64ec.sh --build

      - name: Install Proton
        run: |
          OUTPUT_DIR="$HOME/compiled-files-aarch64"
          DEPS="$HOME/termuxfs/aarch64/data/data/com.termux/files/usr"
          INSTALL_PREFIX="$DEPS/../opt/wine"
          STAGING="$HOME/wine-staging"

          mkdir -p "$OUTPUT_DIR/bin" "$OUTPUT_DIR/lib" "$OUTPUT_DIR/share" "$STAGING"

          cd wine-source
          make install DESTDIR="$STAGING" -j$(nproc)

          STAGED="$STAGING$INSTALL_PREFIX"
          if [ ! -d "$STAGED" ]; then
            echo "ERROR: install tree not found at $STAGED"
            find "$STAGING" -maxdepth 6 -type d | head -20
            exit 1
          fi

          cp -r "$STAGED"/bin/wine*   "$OUTPUT_DIR/bin/" 2>/dev/null || true
          cp -r "$STAGED"/bin/reg*    "$OUTPUT_DIR/bin/" 2>/dev/null || true
          cp -r "$STAGED"/bin/msi*    "$OUTPUT_DIR/bin/" 2>/dev/null || true
          cp -r "$STAGED"/bin/notepad "$OUTPUT_DIR/bin/" 2>/dev/null || true
          cp -r "$STAGED/lib/wine"    "$OUTPUT_DIR/lib/"
          cp -r "$STAGED/share/wine"  "$OUTPUT_DIR/share/"

      - name: Download prefixPack.txz
        run: |
          wget https://github.com/GameNative/bionic-prefix-files/raw/main/prefixPack-arm64ec.txz \
            -O $HOME/compiled-files-aarch64/prefixPack.txz

      - name: Generate profile.json files and package
        run: |
          OUTPUT_DIR="$HOME/compiled-files-aarch64"
          GIT_HASH=$(git -C wine-source rev-parse --short HEAD)
          GIT_DATE=$(git -C wine-source log -1 --format='%cd' --date=format:'%Y%m%d')
          VERSION="10-arm64ec-nightly-${GIT_DATE}-${GIT_HASH}"

          mkdir -p "$GITHUB_WORKSPACE/output"

          # versionCode: use date as YYYYMMDD integer (matches GameNative convention)
          VERSION_CODE=$(echo "${GIT_DATE}" | tr -d '-')

          # Proton profile — for standard Winlator / GameNative
          python3 scripts/generate_profile.py \
            "${OUTPUT_DIR}/profile.json" \
            "${VERSION}" \
            "${VERSION_CODE}" \
            "Proton 10 ARM64 nightly ${GIT_DATE} (${GIT_HASH})"

          cd "$OUTPUT_DIR"
          # GameNative expects XZ-compressed .wcp (not zstd)
          tar -cJf "$GITHUB_WORKSPACE/output/proton-${VERSION}.wcp" \
            bin lib share prefixPack.txz profile.json

          # Wine profile — for Winlator CMOD / Ludashi
          python3 "$GITHUB_WORKSPACE/scripts/generate_profile.py" \
            "${OUTPUT_DIR}/profile.json" \
            "${VERSION}" \
            "${VERSION_CODE}" \
            "Proton 10 ARM64 nightly ${GIT_DATE} (${GIT_HASH})" \
            wine

          tar -cJf "$GITHUB_WORKSPACE/output/proton-wine-${VERSION}.wcp.xz" \
            bin lib share prefixPack.txz profile.json

          cd "$GITHUB_WORKSPACE"
          sha256sum output/proton-${VERSION}.wcp > output/proton-${VERSION}.wcp.sha256
          sha256sum output/proton-wine-${VERSION}.wcp.xz > output/proton-wine-${VERSION}.wcp.xz.sha256

          ls -lh output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proton-arm64-nightly
          path: output/
          retention-days: 30

      - name: Create GitHub Release
        run: |
          GIT_HASH=$(git -C wine-source rev-parse --short HEAD)
          GIT_DATE=$(git -C wine-source log -1 --format='%cd' --date=format:'%Y%m%d')
          VERSION="10-arm64ec-nightly-${GIT_DATE}-${GIT_HASH}"
          TAG="nightly-${GIT_DATE}-${GIT_HASH}"
          gh release create "$TAG" output/* \
            --title "Proton 10 ARM64 Nightly (${GIT_DATE})" \
            --notes "Built from ValveSoftware/wine bleeding-edge @ ${GIT_HASH} with GameNative Android + ARM64EC patches. Automated nightly — use at your own risk." \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest.json
        run: |
          GIT_HASH=$(git -C wine-source rev-parse --short HEAD)
          GIT_DATE=$(git -C wine-source log -1 --format='%cd' --date=format:'%Y%m%d')
          VERSION="10-arm64ec-nightly-${GIT_DATE}-${GIT_HASH}"
          WCP_SHA=$(cut -d' ' -f1 output/proton-${VERSION}.wcp.sha256)
          WCPXZ_SHA=$(cut -d' ' -f1 output/proton-wine-${VERSION}.wcp.xz.sha256)
          python3 scripts/generate_latest.py \
            "latest.json" \
            "${VERSION}" \
            "${GIT_DATE}" \
            "${GIT_HASH}" \
            "proton-${VERSION}.wcp" \
            "${WCP_SHA}" \
            "proton-wine-${VERSION}.wcp.xz" \
            "${WCPXZ_SHA}" \
            "nightly-${GIT_DATE}-${GIT_HASH}"
          cat latest.json

      - name: Commit latest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git diff --staged --quiet || git commit -m "chore: update latest.json for nightly $(git -C wine-source log -1 --format='%cd' --date=format:'%Y%m%d')"
          git push
