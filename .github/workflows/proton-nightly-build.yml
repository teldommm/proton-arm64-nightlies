name: Proton ARM64 Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'   # 2 AM UTC daily
  workflow_dispatch:        # Manual trigger
    inputs:
      wine_ref:
        description: 'Wine source ref (branch, tag, or commit)'
        required: false
        default: 'proton_10.0'
      debug:
        description: 'Enable debug output'
        required: false
        default: 'false'

env:
  WINE_SOURCE_REPO: https://github.com/GameNative/proton-wine
  WINE_REF: ${{ github.event.inputs.wine_ref || 'proton_10.0' }}
  # Upstream Valve Wine branch to merge nightly changes from.
  # bleeding-edge = the branch ValveSoftware/Proton bleeding-edge pins its
  # wine submodule to; always the most up-to-date Valve Wine commits.
  UPSTREAM_REPO: https://github.com/ValveSoftware/wine
  UPSTREAM_REF: bleeding-edge

jobs:
  build:
    name: Build Proton ARM64 Android
    runs-on: ubuntu-24.04
    timeout-minutes: 360   # 6 hour limit

    steps:
      # --------------------------------------------------------
      # 1. Free disk space
      # --------------------------------------------------------
      - name: Free disk space
        run: |
          echo "Disk before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          docker system prune -af || true
          echo "Disk after cleanup:"
          df -h

      # --------------------------------------------------------
      # 2. Install build dependencies
      # --------------------------------------------------------
      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            git \
            wget \
            curl \
            unzip \
            flex \
            bison \
            gettext \
            autoconf \
            automake \
            libtool \
            pkg-config \
            mingw-w64 \
            gcc-multilib \
            g++-multilib \
            libfreetype6-dev \
            libfreetype6-dev:i386 \
            libpng-dev \
            libpng-dev:i386 \
            zlib1g-dev \
            zlib1g-dev:i386 \
            ccache \
            zstd \
            python3-pip \
            tar \
            xz-utils
          pip3 install zstandard --quiet

      # --------------------------------------------------------
      # 3. Checkout Wine source and merge upstream Valve nightly
      # --------------------------------------------------------
      - name: Clone Wine source (GameNative/proton-wine)
        run: |
          git clone --depth=50 --branch "${{ env.WINE_REF }}" \
            "${{ env.WINE_SOURCE_REPO }}" wine-source

      - name: Merge upstream Valve proton_10.0 changes
        run: |
          cd wine-source
          git remote add upstream "${{ env.UPSTREAM_REPO }}"
          # Fetch only the upstream branch tip (shallow, enough for merge base detection)
          git fetch --depth=50 upstream "${{ env.UPSTREAM_REF }}"

          UPSTREAM_HASH=$(git rev-parse upstream/${{ env.UPSTREAM_REF }})
          LOCAL_HASH=$(git rev-parse HEAD)
          echo "GameNative HEAD:  $LOCAL_HASH"
          echo "Valve upstream:   $UPSTREAM_HASH"

          # Check if upstream has anything not already in our branch
          if git merge-base --is-ancestor upstream/${{ env.UPSTREAM_REF }} HEAD; then
            echo "No new upstream commits — GameNative is already up to date."
          else
            echo "Merging upstream Valve commits..."
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            # Merge strategy: prefer GameNative patches (ours) on conflict
            git merge --no-edit -X ours upstream/${{ env.UPSTREAM_REF }} \
              || { echo "Merge failed — upstream conflict too large; building GameNative HEAD only."; git merge --abort; }
            echo "Merge complete."
          fi

          echo "GIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "GIT_DATE=$(git log -1 --format='%cd' --date=format:'%Y%m%d')" >> $GITHUB_ENV
          echo "UPSTREAM_SHORT=$(echo $UPSTREAM_HASH | cut -c1-7)" >> $GITHUB_ENV

      - name: Report source state
        run: |
          echo "=== Source state ==="
          echo "Branch:    ${{ env.WINE_REF }}"
          echo "Our HEAD:  ${{ env.GIT_HASH }}"
          echo "Valve tip: ${{ env.UPSTREAM_SHORT }}"
          git -C wine-source log --oneline -10

      # --------------------------------------------------------
      # 4. Checkout this repo (packaging scripts)
      # --------------------------------------------------------
      - name: Checkout build scripts
        uses: actions/checkout@v4
        with:
          path: build-scripts

      # --------------------------------------------------------
      # 5. Download termuxfs (provides sysroot + pre-built deps)
      # --------------------------------------------------------
      - name: Download termuxfs for aarch64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/GameNative/termux-on-gha/releases/download/build-20260218/termuxfs-aarch64.tar
          tar -xf termuxfs-aarch64.tar
          rm termuxfs-aarch64.tar
          echo "termuxfs ready:"
          ls -lh $HOME/termuxfs/aarch64/

      # --------------------------------------------------------
      # 6. Android NDK r27d
      # --------------------------------------------------------
      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/Android/Sdk/ndk/27.3.13750724
          key: android-ndk-r27d

      - name: Download Android NDK r27d
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/Android/Sdk/ndk
          cd $HOME/Android/Sdk/ndk
          wget -q https://dl.google.com/android/repository/android-ndk-r27d-linux.zip
          unzip -q android-ndk-r27d-linux.zip
          mv android-ndk-r27d 27.3.13750724
          rm android-ndk-r27d-linux.zip

      # --------------------------------------------------------
      # 7. bylaws/llvm-mingw toolchain
      # --------------------------------------------------------
      - name: Cache LLVM MinGW toolchain
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: ~/toolchains/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64
          key: bylaws-llvm-mingw-20250920

      - name: Download LLVM MinGW toolchain
        if: steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/toolchains
          cd $HOME/toolchains
          wget -q https://github.com/bylaws/llvm-mingw/releases/download/20250920/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
          tar -xf llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
          rm llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz

      # --------------------------------------------------------
      # 8. Run autogen (Wine codegen pre-configure step)
      # --------------------------------------------------------
      - name: Run autogen.sh
        run: |
          cd wine-source
          bash autogen.sh

      # --------------------------------------------------------
      # 9. Build host wine-tools
      # --------------------------------------------------------
      - name: Cache wine-tools
        id: cache-wine-tools
        uses: actions/cache@v4
        with:
          path: wine-source/wine-tools
          key: wine-tools-${{ hashFiles('wine-source/configure.ac', 'wine-source/configure') }}

      - name: Build host wine-tools
        if: steps.cache-wine-tools.outputs.cache-hit != 'true'
        run: |
          cd wine-source
          mkdir wine-tools
          cd wine-tools
          ../configure --without-x --without-gstreamer --without-vulkan --without-wayland
          make -j$(nproc) __tooldeps__ nls/all

      # --------------------------------------------------------
      # 10. Build android_sysvshm library
      # --------------------------------------------------------
      - name: Build android_sysvshm
        run: |
          export TOOLCHAIN="$HOME/Android/Sdk/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export LLVM_MINGW_TOOLCHAIN="$HOME/toolchains/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64/bin"
          export PATH=$LLVM_MINGW_TOOLCHAIN:$PATH
          cd wine-source
          bash build-scripts/build-step-arm64ec.sh --build-sysvshm

      # --------------------------------------------------------
      # 11. Configure ARM64 target
      # --------------------------------------------------------
      - name: Configure ARM64 Android target
        run: |
          cd wine-source
          bash build-scripts/build-step-arm64ec.sh --configure

      # --------------------------------------------------------
      # 12. Build Wine ARM64
      # --------------------------------------------------------
      - name: Build Wine ARM64
        run: |
          cd wine-source
          bash build-scripts/build-step-arm64ec.sh --build 2>&1 | tee build.log
          tail -5 build.log

      # --------------------------------------------------------
      # 13. Install Wine ARM64
      # --------------------------------------------------------
      - name: Install Wine ARM64
        run: |
          cd wine-source
          bash build-scripts/build-step-arm64ec.sh --install

      # --------------------------------------------------------
      # 14. Download prefixPack.txz
      # --------------------------------------------------------
      - name: Download prefixPack.txz
        run: |
          wget -q https://github.com/GameNative/bionic-prefix-files/raw/main/prefixPack-arm64ec.txz \
            -O "$HOME/compiled-files-aarch64/prefixPack.txz"

      # --------------------------------------------------------
      # 15. Generate profile.json
      # --------------------------------------------------------
      - name: Generate profile.json
        run: |
          python3 build-scripts/scripts/generate_profile.py \
            "$HOME/compiled-files-aarch64/profile.json" \
            "10-arm64ec-nightly-${{ env.GIT_DATE }}-${{ env.GIT_HASH }}" \
            "${{ env.GIT_DATE }}" \
            "Proton 10 ARM64 nightly build from commit ${{ env.GIT_HASH }} (${{ env.GIT_DATE }})"
          cat "$HOME/compiled-files-aarch64/profile.json"

      # --------------------------------------------------------
      # 16. Package as .wcp (tar+zstd for GameNative/Winlator)
      #     and .wcp.xz (tar+xz for Winlator CMOD)
      # --------------------------------------------------------
      - name: Package artifacts
        run: |
          OUTPUT_DIR="$HOME/compiled-files-aarch64"
          VERSION_NAME="10-arm64ec-nightly-${{ env.GIT_DATE }}-${{ env.GIT_HASH }}"
          mkdir -p output

          # Proton .wcp (zstd) — for GameNative / Winlator
          WCP="output/proton-10-arm64ec-nightly-${{ env.GIT_DATE }}-${{ env.GIT_HASH }}.wcp"
          cd "$OUTPUT_DIR"
          tar -cf - bin lib share prefixPack.txz profile.json | zstd -T0 -19 -o "$GITHUB_WORKSPACE/$WCP"
          cd "$GITHUB_WORKSPACE"
          sha256sum "$WCP" > "${WCP}.sha256"

          # Wine .wcp.xz (xz) — for Winlator CMOD / Ludashi
          # Generate Wine-type profile
          python3 build-scripts/scripts/generate_profile.py \
            "$OUTPUT_DIR/profile-wine.json" \
            "10-arm64ec-nightly-${{ env.GIT_DATE }}-${{ env.GIT_HASH }}" \
            "${{ env.GIT_DATE }}" \
            "Proton 10 ARM64 nightly build from commit ${{ env.GIT_HASH }} (${{ env.GIT_DATE }})" \
            wine
          cp "$OUTPUT_DIR/profile-wine.json" "$OUTPUT_DIR/profile.json"
          WCPXZ="output/proton-wine-10-arm64ec-nightly-${{ env.GIT_DATE }}-${{ env.GIT_HASH }}.wcp.xz"
          cd "$OUTPUT_DIR"
          tar -cJf "$GITHUB_WORKSPACE/$WCPXZ" bin lib share prefixPack.txz profile.json
          cd "$GITHUB_WORKSPACE"
          sha256sum "$WCPXZ" > "${WCPXZ}.sha256"

          echo "OUTPUT_WCP=$(basename $WCP)" >> $GITHUB_ENV
          echo "OUTPUT_WCPXZ=$(basename $WCPXZ)" >> $GITHUB_ENV

          echo "Packages created:"
          ls -lh output/

      # --------------------------------------------------------
      # 17. Upload artifacts
      # --------------------------------------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proton-arm64-nightly-${{ env.GIT_DATE }}-${{ env.GIT_HASH }}
          path: |
            output/*.wcp
            output/*.wcp.xz
            output/*.sha256
          retention-days: 30

      # --------------------------------------------------------
      # 18. Create GitHub Release
      # --------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ env.GIT_DATE }}-${{ env.GIT_HASH }}
          name: "Proton 10 ARM64 Nightly (${{ env.GIT_DATE }})"
          body: |
            ## Proton 10 ARM64 Nightly Build

            **Build date:** ${{ env.GIT_DATE }}
            **Build commit:** ${{ env.GIT_HASH }}
            **Valve upstream:** ValveSoftware/wine bleeding-edge @ ${{ env.UPSTREAM_SHORT }}
            **Base:** GameNative/proton-wine (Android patches + ARM64EC bylaws patches)
            **Target:** Android ARM64 (API 28+, bionic)
            **Toolchain:** Android NDK r27d + bylaws/llvm-mingw-20250920

            > Upstream Valve `bleeding-edge` (the Wine branch Proton bleeding-edge tracks) is automatically merged each night.
            > GameNative patches take priority on conflict.
            > This is an automated nightly build for testing purposes. Use at your own risk.

            ### Installation

            **For GameNative / Winlator (standard):**
            1. Download `${{ env.OUTPUT_WCP }}`
            2. Open Winlator > Settings > Wine Version > Import
            3. Select the `.wcp` file

            **For Winlator CMOD / Ludashi:**
            1. Download `${{ env.OUTPUT_WCPXZ }}`
            2. Import via the Wine Version settings

            ### Verification
            ```
            sha256sum ${{ env.OUTPUT_WCP }}
            sha256sum ${{ env.OUTPUT_WCPXZ }}
            ```
            Check against the `.sha256` files.

            ### What's included
            - Wine ARM64 (aarch64-linux-android, bionic)
            - ARM64EC PE DLLs (arm64ec-windows)
            - ARM64 PE DLLs (aarch64-windows)
            - 32-bit PE DLLs (i386-windows) for WoW64
            - Default Wine prefix (prefixPack.txz)
            - Android-specific patches (networking, sysvshm, SDL, Vulkan, Pulse)
            - ARM64EC bylaws patches (XSTATE, thread suspension, virtual memory)
          files: |
            output/*.wcp
            output/*.wcp.xz
            output/*.sha256
          prerelease: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------------------------------
      # 19. Update latest.json
      # --------------------------------------------------------
      - name: Update latest.json
        run: |
          WCP_SHA=$(cut -d' ' -f1 output/${{ env.OUTPUT_WCP }}.sha256)
          WCPXZ_SHA=$(cut -d' ' -f1 output/${{ env.OUTPUT_WCPXZ }}.sha256)
          python3 - <<'PYEOF'
          import json, os
          data = {
            "versionName": f"10-arm64ec-nightly-{os.environ['GIT_DATE']}-{os.environ['GIT_HASH']}",
            "date": os.environ['GIT_DATE'],
            "gitHash": os.environ['GIT_HASH'],
            "wcp": {
              "fileName": os.environ['OUTPUT_WCP'],
              "sha256": os.environ['WCP_SHA']
            },
            "wcpxz": {
              "fileName": os.environ['OUTPUT_WCPXZ'],
              "sha256": os.environ['WCPXZ_SHA']
            },
            "releaseTag": f"nightly-{os.environ['GIT_DATE']}-{os.environ['GIT_HASH']}"
          }
          with open("latest.json", "w") as f:
            json.dump(data, f, indent=2)
          print(json.dumps(data, indent=2))
          PYEOF
        env:
          WCP_SHA: ${{ env.WCP_SHA }}
          WCPXZ_SHA: ${{ env.WCPXZ_SHA }}

      - name: Commit latest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git diff --staged --quiet || git commit -m "chore: update latest.json for nightly ${{ env.GIT_DATE }}"
          git push

      # --------------------------------------------------------
      # 20. ccache stats
      # --------------------------------------------------------
      - name: ccache stats
        if: always()
        run: ccache --show-stats || true
